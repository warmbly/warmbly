apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: warmbly
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      serviceAccountName: warmbly-backend
      containers:
        - name: backend
          image: warmbly/backend:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: warmbly-config
            - secretRef:
                name: warmbly-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
