apiVersion: apps/v1
kind: Deployment
metadata:
  name: realtime
  namespace: warmbly
  labels:
    app: realtime
spec:
  replicas: 2
  selector:
    matchLabels:
      app: realtime
  template:
    metadata:
      labels:
        app: realtime
    spec:
      serviceAccountName: warmbly-realtime
      containers:
        - name: realtime
          image: warmbly/realtime:latest
          ports:
            - containerPort: 4000
          env:
            - name: PHX_SERVER
              value: "true"
          envFrom:
            - configMapRef:
                name: warmbly-config
            - secretRef:
                name: warmbly-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
