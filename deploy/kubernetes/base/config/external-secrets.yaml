apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: warmbly-secrets
  namespace: warmbly
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: warmbly-secrets
    creationPolicy: Owner
  data:
    # === Database ===
    - secretKey: PRIMARY_DB
      remoteRef:
        key: warmbly/prod/postgres/primary
    - secretKey: REDIS
      remoteRef:
        key: warmbly/prod/redis/primary

    # === Kafka ===
    - secretKey: KAFKA_BOOTSTRAP_SERVERS
      remoteRef:
        key: kafka/bootstrap_servers
    - secretKey: KAFKA_SASL_USERNAME
      remoteRef:
        key: kafka/sasl/username
    - secretKey: KAFKA_SASL_PASSWORD
      remoteRef:
        key: kafka/sasl/password

    # === Schema Registry ===
    - secretKey: SCHEMA_REGISTRY_URL
      remoteRef:
        key: kafka/schema_registry/endpoint
    - secretKey: SCHEMA_REGISTRY_KEY
      remoteRef:
        key: kafka/schema_registry/key
    - secretKey: SCHEMA_REGISTRY_SECRET
      remoteRef:
        key: kafka/schema_registry/secret

    # === Auth ===
    - secretKey: AUTH_SECRET
      remoteRef:
        key: warmbly/prod/auth_secret
    - secretKey: JWT_SECRET
      remoteRef:
        key: warmbly/prod/auth/jwt_secret
    - secretKey: SECRET_KEY_BASE
      remoteRef:
        key: warmbly/prod/phoenix/secret_key_base
    - secretKey: TURNSTILE_SECRET
      remoteRef:
        key: warmbly/prod/turnstile/secret

    # === OAuth ===
    - secretKey: GOOGLE_CLIENT_SECRET
      remoteRef:
        key: warmbly/prod/google-auth/client_secret
    - secretKey: APPLE_KEY_SECRET
      remoteRef:
        key: warmbly/prod/apple-auth/key_secret

    # === Stripe ===
    - secretKey: STRIPE_SECRET_KEY
      remoteRef:
        key: warmbly/prod/stripe/secret_key
    - secretKey: STRIPE_WEBHOOK_SECRET
      remoteRef:
        key: warmbly/prod/stripe/webhook_secret

    # === GCP ===
    - secretKey: GOOGLE_APPLICATION_CREDENTIALS_JSON
      remoteRef:
        key: warmbly/prod/gcp/service_account_json

    # === Cassandra/Astra ===
    - secretKey: ASTRA_APPLICATION_TOKEN
      remoteRef:
        key: warmbly/prod/astra/application_token

    # === Sentry ===
    - secretKey: SENTRY_DSN
      remoteRef:
        key: warmbly/prod/sentry_dsn/backend

    # === Websocket ===
    - secretKey: WEBSOCKET_URL
      remoteRef:
        key: warmbly/prod/api/websocket_uri

    # === GeoDB Path ===
    - secretKey: GEODB_PATH
      remoteRef:
        key: warmbly/prod/geodb_path
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: warmbly-astra-config
  namespace: warmbly
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: warmbly-astra-config
    creationPolicy: Owner
  data:
    - secretKey: ASTRA_DB_ID
      remoteRef:
        key: /warmbly/prod/astra/db_id
    - secretKey: ASTRA_DB_REGION
      remoteRef:
        key: /warmbly/prod/astra/db_region
    - secretKey: ASTRA_KEYSPACE_NAME
      remoteRef:
        key: /warmbly/prod/astra/keyspace_name
