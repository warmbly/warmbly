apiVersion: v1
kind: ConfigMap
metadata:
  name: warmbly-config
  namespace: warmbly
data:
  # === General ===
  APP_ENV: "prod"
  AWS_REGION: "us-east-1"
  AWS_CONFIG_ENABLED: "false"  # Set to "true" to enable AWS SSM/Secrets fallback

  # === API (Backend) ===
  API_HOST: "0.0.0.0:8080"
  API_PORT: "8080"
  GIN_MODE: "release"

  # === Tracking ===
  TRACKING_HOST: "0.0.0.0"
  TRACKING_PORT: "3000"

  # === Realtime ===
  PORT: "4000"
  PHX_HOST: "realtime.warmbly.com"
  PUBSUB_ENABLED: "true"
  CHECK_ORIGIN: "false"
  MAX_CONNECTIONS_PER_USER: "10"
  MAX_CONNECTIONS_PER_IP: "50"
  MAX_CONNECTIONS_GLOBAL: "100000"
  RATE_LIMIT_WS_MESSAGE: "120"
  RATE_LIMIT_WS_JOIN: "30"
  RATE_LIMIT_WS_EVENT: "60"
  DATABASE_POOL_SIZE: "10"

  # === Kafka (non-sensitive) ===
  KAFKA_CONSUMER_GROUP: "consumer-group"
  KAFKA_TRACKING_TOPIC: "tracking-events"
  KAFKA_WORKER_EVENTS_TOPIC: "worker-events"

  # === Auth (non-sensitive) ===
  GOOGLE_CLIENT_ID: ""
  GOOGLE_REDIRECT_URI: ""
  APPLE_APP_ID: ""
  APPLE_TEAM_ID: ""
  APPLE_KEY_ID: ""

  # === Stripe (non-sensitive) ===
  STRIPE_PUBLISHABLE_KEY: ""

  # === Email (non-sensitive) ===
  EMAIL_NAME: "Warmbly"
  EMAIL_ADDRESS: "notifications@warmbly.com"
  TRACKING_DOMAIN: "track.warmbly.com"

  # === GCP (non-sensitive) ===
  GCP_PROJECT_ID: ""
