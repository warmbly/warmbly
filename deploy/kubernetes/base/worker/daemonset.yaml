apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: worker
  namespace: warmbly
  labels:
    app: worker
spec:
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      serviceAccountName: warmbly-worker
      # Only schedule on worker-labeled nodes
      nodeSelector:
        warmbly.com/role: worker
      tolerations:
        - key: "warmbly.com/role"
          operator: "Equal"
          value: "worker"
          effect: "NoSchedule"
      containers:
        - name: worker
          image: warmbly/worker:latest
          env:
            # Worker ID from node name (stable across pod restarts)
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          envFrom:
            - configMapRef:
                name: warmbly-config
            - secretRef:
                name: warmbly-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
