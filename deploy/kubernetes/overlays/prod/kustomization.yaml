apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: warmbly

resources:
  - ../../base

# Domain replacements
replacements:
  - source:
      kind: ConfigMap
      name: domain-config
      fieldPath: data.API_DOMAIN
    targets:
      - select:
          kind: Ingress
        fieldPaths:
          - spec.rules.0.host
          - spec.tls.0.hosts.0

configMapGenerator:
  - name: domain-config
    literals:
      - API_DOMAIN=api.warmbly.com
      - GATEWAY_DOMAIN=gateway.warmbly.com
      - TRACKING_DOMAIN=t.warmbly.com

images:
  - name: warmbly/backend
    newName: ghcr.io/warmbly/warmbly/backend
    newTag: prod
  - name: warmbly/consumer
    newName: ghcr.io/warmbly/warmbly/consumer
    newTag: prod
  - name: warmbly/worker
    newName: ghcr.io/warmbly/warmbly/worker
    newTag: prod
  - name: warmbly/tracking
    newName: ghcr.io/warmbly/warmbly/tracking
    newTag: prod
  - name: warmbly/realtime
    newName: ghcr.io/warmbly/warmbly/realtime
    newTag: prod

patches:
  - path: patches/replicas.yaml
