syntax = "proto3";

package tasks;

option go_package = "warmbly/internal/tasks/proto;proto";

message CampaignTask {
  // UUID of the campaign
  string campaign_id = 1;
  // UUID of the task
  string task_id = 2;
}

message EmailTask {
  // UUID of the email account
  string email_id = 1;
  // UUID of the task
  string task_id = 2;
}
