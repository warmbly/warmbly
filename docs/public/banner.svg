<svg width="1280" height="340" viewBox="0 0 1280 340" fill="none" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" role="img" aria-label="Warmbly — open-source cold email and mailbox warmup you can self-host">
  <title>Warmbly</title>
  <defs>
    <!-- Deep-sky ramp, bright point toward the upper right like the marketing hero -->
    <radialGradient id="sky" cx="0.72" cy="0.2" r="0.95">
      <stop offset="0" stop-color="#7dd3fc" />
      <stop offset="0.14" stop-color="#38bdf8" />
      <stop offset="0.30" stop-color="#0ea5e9" />
      <stop offset="0.50" stop-color="#0284c7" />
      <stop offset="0.74" stop-color="#075985" />
      <stop offset="1" stop-color="#053f61" />
    </radialGradient>

    <!-- Warm sun glow -->
    <radialGradient id="sun" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fde68a" stop-opacity="0.34" />
      <stop offset="0.34" stop-color="#fdba74" stop-opacity="0.12" />
      <stop offset="0.7" stop-color="#bae6fd" stop-opacity="0.04" />
      <stop offset="1" stop-color="#bae6fd" stop-opacity="0" />
    </radialGradient>

    <!-- Soft center scrim so the white lockup keeps contrast over mid-sky -->
    <radialGradient id="scrim" cx="0.5" cy="0.46" r="0.46">
      <stop offset="0" stop-color="#042e4e" stop-opacity="0.34" />
      <stop offset="0.45" stop-color="#042e4e" stop-opacity="0.16" />
      <stop offset="0.8" stop-color="#042e4e" stop-opacity="0" />
    </radialGradient>

    <!-- Bottom haze -->
    <linearGradient id="haze" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#bae6fd" stop-opacity="0.16" />
      <stop offset="0.4" stop-color="#7dd3fc" stop-opacity="0.06" />
      <stop offset="1" stop-color="#7dd3fc" stop-opacity="0" />
    </linearGradient>

    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="9" />
    </filter>

    <!-- One painterly cloud, reused at several scales/opacities -->
    <g id="cl" fill="#ffffff">
      <ellipse cx="70" cy="58" rx="62" ry="30" />
      <ellipse cx="135" cy="46" rx="72" ry="40" />
      <ellipse cx="205" cy="58" rx="58" ry="30" />
      <ellipse cx="135" cy="74" rx="120" ry="26" />
    </g>

    <clipPath id="round">
      <rect width="1280" height="340" rx="22" />
    </clipPath>
  </defs>

  <g clip-path="url(#round)">
    <!-- Atmosphere -->
    <rect width="1280" height="340" fill="url(#sky)" />
    <ellipse cx="1050" cy="35" rx="340" ry="250" fill="url(#sun)" />
    <rect width="1280" height="340" fill="url(#scrim)" />
    <rect y="170" width="1280" height="170" fill="url(#haze)" />

    <!-- Clouds -->
    <g filter="url(#soft)">
      <use xlink:href="#cl" href="#cl" transform="translate(30,18) scale(1.18)" opacity="0.50" />
      <use xlink:href="#cl" href="#cl" transform="translate(520,-12) scale(0.7)" opacity="0.34" />
      <use xlink:href="#cl" href="#cl" transform="translate(940,28) scale(1.05)" opacity="0.42" />
      <use xlink:href="#cl" href="#cl" transform="translate(110,252) scale(0.9)" opacity="0.30" />
      <use xlink:href="#cl" href="#cl" transform="translate(900,258) scale(1.0)" opacity="0.26" />
    </g>

    <!-- Twinkling sparkles -->
    <path d="M7 1 L8.5 5.5 L13 7 L8.5 8.5 L7 13 L5.5 8.5 L1 7 L5.5 5.5 Z" fill="#ffffff" fill-opacity="0.9" transform="translate(414,62) scale(1.7)" />
    <path d="M7 1 L8.5 5.5 L13 7 L8.5 8.5 L7 13 L5.5 8.5 L1 7 L5.5 5.5 Z" fill="#ffffff" fill-opacity="0.7" transform="translate(842,232) scale(1.1)" />

    <!-- Lockup: white mark inline with the wordmark, centered -->
    <g transform="translate(441,114) scale(0.094241)">
      <path d="M222.805 644.772L186.274 108.881L704.5 451.158L484.5 451.158L245.5 196.158L444 463.5L222.805 644.772Z" fill="#ffffff" />
    </g>
    <text x="539" y="150" fill="#ffffff" text-anchor="start" dominant-baseline="central"
          textLength="300" lengthAdjust="spacingAndGlyphs"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif"
          font-size="72" font-weight="800" letter-spacing="-2">Warmbly</text>

    <!-- Tracked tagline -->
    <text x="640" y="226" fill="#ffffff" fill-opacity="0.74" text-anchor="middle"
          font-family="ui-monospace, 'SF Mono', SFMono-Regular, Menlo, monospace"
          font-size="15" font-weight="600" letter-spacing="3.5">COLD EMAIL · MAILBOX WARMUP · SELF-HOSTED</text>

    <!-- Crisp inner edge -->
    <rect x="0.5" y="0.5" width="1279" height="339" rx="21.5" fill="none" stroke="#ffffff" stroke-opacity="0.14" />
  </g>
</svg>
