# pnpm 11+ settings live here, not in package.json.
# Allow native build scripts that ship with these packages so
# `pnpm install` and `pnpm dev` work without manual approval.
allowBuilds:
  esbuild: true
  sharp: true

# Clear CVE-2026-59869 (DoS via crafted YAML) in the transitive js-yaml.
overrides:
  js-yaml: ^4.3.0
  # Clear the libvips CVEs inherited by sharp (fixed in 0.35.0).
  sharp: ^0.35.0
