run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  # disable-all + explicit enable list so we don't accidentally
  # inherit golangci-lint's defaults (which include errcheck — the
  # legacy codebase has thousands of unchecked tx.Rollback() calls
  # that aren't worth fixing in this PR).
  #
  # Dropped from the set on top of errcheck:
  #   - unused / unconvert / gosimple: hundreds of pre-existing
  #     violations in legacy `internal/repository`, `internal/scheduler`
  #     and `internal/client/smtpimap` — out of scope for this PR.
  #
  # Kept the real-bug linters: govet (subset), staticcheck,
  # ineffassign, typecheck, bodyclose, noctx, sqlclosecheck,
  # plus gofmt + goimports + misspell for formatting hygiene.
  disable-all: true
  enable:
    - govet
    - ineffassign
    - staticcheck
    - typecheck
    - gofmt
    - goimports
    - misspell
    - bodyclose
    - noctx
    - sqlclosecheck

linters-settings:
  govet:
    # shadow + nilness fire on legacy patterns that aren't bugs in
    # this codebase (Rollback after a successful Commit shadows err
    # idiomatically; some Go-idiomatic nil checks read as
    # tautological to the analyzer). Field-alignment is intentional
    # readability, not a bug.
    enable-all: true
    disable:
      - fieldalignment
      - shadow
      - nilness

  goimports:
    local-prefixes: github.com/warmbly/warmbly

  misspell:
    locale: US

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gosec
        - unparam

    - path: cmd/
      linters:
        - unparam

  max-issues-per-linter: 50
  max-same-issues: 10
