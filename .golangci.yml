run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  # disable-all + explicit enable list so we don't accidentally
  # inherit golangci-lint's defaults (which include errcheck — the
  # legacy codebase has thousands of unchecked tx.Rollback() calls
  # that aren't worth fixing in this PR).
  disable-all: true
  enable:
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - typecheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - bodyclose
    - noctx
    - sqlclosecheck

linters-settings:
  govet:
    enable-all: true
    disable:
      - fieldalignment

  goimports:
    local-prefixes: github.com/warmbly/warmbly

  misspell:
    locale: US

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gosec
        - unparam

    - path: cmd/
      linters:
        - unparam

  max-issues-per-linter: 50
  max-same-issues: 10
